baseURL: "https://d3vilsec.com/"
title: "d3vilsec"
theme: "PaperMod"
pagination:
  pagerSize: 25

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  author: d3vilsec
  description: "Marine veteran. Federal IT. Cybersecurity."
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  homeInfoParams:
    Title: "Building, breaking, and securing — out loud."
    Content: "Field notes from a Marine veteran and federal IT pro learning offensive and defensive security in the homelab. Proxmox, Docker Swarm, FreeIPA, Ansible, and whatever I'm tearing apart this week — documented as I go."

  socialIcons:
    - name: github
      url: "https://github.com/d3vilsec"
    - name: twitter
      url: "https://twitter.com/_d3vilsec"
    - name: youtube
      url: "https://youtube.com/@d3vilsec"

menu:
  main:
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: cheatsheets
      name: Cheatsheets
      url: /cheatsheets/
      weight: 25
    - identifier: search
      name: Search
      url: /search/
      weight: 40
